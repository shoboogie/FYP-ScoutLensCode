services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: scoutlens
      POSTGRES_USER: scoutlens
      POSTGRES_PASSWORD: scoutlens
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scoutlens"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://scoutlens:scoutlens@db:5432/scoutlens
      DATABASE_URL_SYNC: postgresql://scoutlens:scoutlens@db:5432/scoutlens
    depends_on:
      db: { condition: service_healthy }
    volumes: [./data:/app/data]
  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    depends_on: [backend]
volumes:
  pgdata:
